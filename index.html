<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Philly Metro Light Pollution Map</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

   <!-- Orbitron font -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <!-- Dark theme & map styling -->
  <style>
    body {
      background-color: #0b1a36; /* navy blue */
      color: #ffffff;            /* white text */
      font-family: 'Orbitron', sans-serif;
      margin: 0;
      padding: 0;
    }

    h1 {
      text-align: center;
      padding: 10px;
    }

    #map {
      height: 90vh;
      width: 100%;
    }

   .legend i {
  width: 18px;
  height: 18px;
  display: inline-block;
  margin-right: 8px;
  opacity: 0.9;
  vertical-align: middle;
}

    /* Dark popups */
    .leaflet-popup-content-wrapper {
      background: #1a2a4a;
      color: #ffffff;
      font-size: 14px;
    }

    .leaflet-popup-tip {
      background: #1a2a4a;
    }
  </style>
</head>
<body>

  <h1>Philly Metro Light Pollution Map</h1>
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <!-- Heatmap plugin (REQUIRED) -->
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

  <script src="script.js"></script>
</body>
</html>
